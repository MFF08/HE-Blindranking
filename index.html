<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blindranking – Helmstedt & Lehrkräfte</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="description" content="Blindranking-Spiel: Lehrkräfte (ohne Vornamen, mit Anrede) und Orte in Helmstedt." />
</head>
<body>
  <header class="app-header">
    <h1>Blindranking</h1>
    <p class="subtitle">Lehrkräfte (ohne Vornamen) und Orte in Helmstedt</p>
  </header>

  <main class="container">
    <section class="controls" role="region" aria-label="Einstellungen">
      <div class="control-group">
        <label for="category">Kategorie</label>
        <select id="category" required aria-label="Kategorie auswählen">
          <!-- wird per JS befüllt -->
        </select>
      </div>

      <div class="control-group">
        <label for="seed">Seed (optional)</label>
        <input id="seed" type="text" placeholder="z. B. HS-2026-A" inputmode="text" />
      </div>

      <div class="control-group control-start">
        <button id="startBtn" class="primary" aria-label="Runde starten">Runde starten</button>
      </div>
    </section>

    <section id="gameSection" class="game hidden" aria-live="polite">
      <div class="status-bar">
        <div id="progress">Item 0/5</div>
        <div id="time"></div>
      </div>

      <div class="current-item">
        <div id="itemCard" class="card">Klicke „Runde starten“</div>
      </div>

      <div class="slots" role="list" aria-label="Ranking-Slots">
        <div class="slot" data-index="0" tabindex="0" aria-label="Platz 1"><span class="slot-label">1</span><div class="slot-item"></div></div>
        <div class="slot" data-index="1" tabindex="0" aria-label="Platz 2"><span class="slot-label">2</span><div class="slot-item"></div></div>
        <div class="slot" data-index="2" tabindex="0" aria-label="Platz 3"><span class="slot-label">3</span><div class="slot-item"></div></div>
        <div class="slot" data-index="3" tabindex="0" aria-label="Platz 4"><span class="slot-label">4</span><div class="slot-item"></div></div>
        <div class="slot" data-index="4" tabindex="0" aria-label="Platz 5"><span class="slot-label">5</span><div class="slot-item"></div></div>
      </div>

      <div class="actions">
        <button id="placeSkip" class="secondary">Überspringen</button>
        <button id="resetRound" class="secondary">Neu starten</button>
      </div>
    </section>

    <section id="resultSection" class="results hidden">
      <h2>Dein Ranking</h2>
      <ol id="resultList" class="result-list"></ol>
      <div class="share">
        <label for="shareLink">Teilen (Seed-Link)</label>
        <input id="shareLink" type="text" readonly />
        <button id="copyLink" class="secondary">Link kopieren</button>
      </div>
      <button id="playAgain" class="primary">Neue Runde</button>
    </section>
  </main>

  <footer class="app-footer">
    <small>Nur persönliches Ranking – keine Referenz- oder Community-Wertung. Kategorien getrennt (keine Mischungen).</small>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
